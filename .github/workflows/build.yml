name: CI Build Check

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Build flavor'
        required: true
        type: choice
        options:
          - api100
          - api101
        default: 'api100'
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - debug
          - release
        default: 'debug'

env:
  JAVA_VERSION: '17'

jobs:
  lint:
    name: Lint and Analyze
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Flutter SDK
        id: cache-flutter
        uses: actions/cache@v4
        with:
          path: flutter
          key: flutter-stable-20260120

      - name: Install Flutter
        if: steps.cache-flutter.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1

      - name: Add Flutter to PATH
        run: echo "${{ github.workspace }}/flutter/bin" >> $GITHUB_PATH

      - name: Verify Dart SDK version
        run: |
          flutter --version
          dart --version

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Pigeon bridge code
        run: |
          if [ -f "lib/pigeons/pinia.dart" ]; then dart run pigeon --input lib/pigeons/pinia.dart; fi
          if [ -f "lib/pigeons/status_management.dart" ]; then dart run pigeon --input lib/pigeons/status_management.dart; fi
          if [ -f "lib/pigeons/app.dart" ]; then dart run pigeon --input lib/pigeons/app.dart; fi
          if [ -f "lib/pigeons/project.dart" ]; then dart run pigeon --input lib/pigeons/project.dart; fi
          if [ -f "lib/pigeons/apk_analysis.dart" ]; then dart run pigeon --input lib/pigeons/apk_analysis.dart; fi
          if [ -f "lib/pigeons/so_analysis.dart" ]; then dart run pigeon --input lib/pigeons/so_analysis.dart; fi
          if [ -f "lib/pigeons/lsposed.dart" ]; then dart run pigeon --input lib/pigeons/lsposed.dart; fi
          if [ -f "lib/pigeons/zygisk_frida.dart" ]; then dart run pigeon --input lib/pigeons/zygisk_frida.dart; fi

      - name: Flutter analyze
        run: flutter analyze || true

      - name: Dart format check
        run: dart format --output=none --set-exit-if-changed . || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Flutter SDK
        id: cache-flutter
        uses: actions/cache@v4
        with:
          path: flutter
          key: flutter-stable-20260120

      - name: Install Flutter
        if: steps.cache-flutter.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1

      - name: Add Flutter to PATH
        run: echo "${{ github.workspace }}/flutter/bin" >> $GITHUB_PATH

      - name: Verify Dart SDK version
        run: |
          flutter --version
          dart --version

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter tests
        run: flutter test || true

  build:
    name: Build ${{ matrix.flavor }}-${{ matrix.build-type }}
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always() && (needs.lint.result == 'success' || needs.lint.result == 'skipped') && (needs.test.result == 'success' || needs.test.result == 'skipped')
    
    strategy:
      fail-fast: false
      matrix:
        flavor: 
          - api100
          - api101
        build-type:
          - debug
          - release
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Flutter SDK
        id: cache-flutter
        uses: actions/cache@v4
        with:
          path: flutter
          key: flutter-stable-20260120

      - name: Install Flutter
        if: steps.cache-flutter.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1

      - name: Add Flutter to PATH
        run: echo "${{ github.workspace }}/flutter/bin" >> $GITHUB_PATH

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Pigeon bridge code
        run: |
          if [ -f "lib/pigeons/pinia.dart" ]; then dart run pigeon --input lib/pigeons/pinia.dart; fi
          if [ -f "lib/pigeons/status_management.dart" ]; then dart run pigeon --input lib/pigeons/status_management.dart; fi
          if [ -f "lib/pigeons/app.dart" ]; then dart run pigeon --input lib/pigeons/app.dart; fi
          if [ -f "lib/pigeons/project.dart" ]; then dart run pigeon --input lib/pigeons/project.dart; fi
          if [ -f "lib/pigeons/apk_analysis.dart" ]; then dart run pigeon --input lib/pigeons/apk_analysis.dart; fi
          if [ -f "lib/pigeons/so_analysis.dart" ]; then dart run pigeon --input lib/pigeons/so_analysis.dart; fi
          if [ -f "lib/pigeons/lsposed.dart" ]; then dart run pigeon --input lib/pigeons/lsposed.dart; fi
          if [ -f "lib/pigeons/zygisk_frida.dart" ]; then dart run pigeon --input lib/pigeons/zygisk_frida.dart; fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (Release)
        if: matrix.build-type == 'release'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assemble${CAPITALIZED_FLAVOR}Release --no-daemon
        env:
          CAPITALIZED_FLAVOR: ${{ matrix.flavor == 'api100' && 'Api100' || 'Api101' }}

      - name: Build APK (Debug)
        if: matrix.build-type == 'debug'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assemble${CAPITALIZED_FLAVOR}Debug --no-daemon
        env:
          CAPITALIZED_FLAVOR: ${{ matrix.flavor == 'api100' && 'Api100' || 'Api101' }}

      - name: Build AAB (Release only)
        if: matrix.build-type == 'release'
        run: |
          cd android
          ./gradlew :app:bundle${CAPITALIZED_FLAVOR}Release --no-daemon
        env:
          CAPITALIZED_FLAVOR: ${{ matrix.flavor == 'api100' && 'Api100' || 'Api101' }}

      - name: List all build outputs
        run: |
          echo "=== Listing all APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo "=== Listing all AAB files ==="
          find . -name "*.aab" -type f 2>/dev/null || echo "No AAB files found"
          echo "=== Directory structure of android/app/build/outputs ==="
          ls -la android/app/build/outputs/ 2>/dev/null || echo "Directory not found"
          echo "=== Directory structure of build/app/outputs ==="
          ls -la build/app/outputs/ 2>/dev/null || echo "Directory not found"

  manual-build:
    name: Manual Build (${{ inputs.flavor }}-${{ inputs.build_type }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Flutter SDK
        id: cache-flutter
        uses: actions/cache@v4
        with:
          path: flutter
          key: flutter-stable-20260120

      - name: Install Flutter
        if: steps.cache-flutter.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1

      - name: Add Flutter to PATH
        run: echo "${{ github.workspace }}/flutter/bin" >> $GITHUB_PATH

      - name: Verify Dart SDK version
        run: |
          flutter --version
          dart --version

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Pigeon bridge code
        run: |
          if [ -f "lib/pigeons/pinia.dart" ]; then dart run pigeon --input lib/pigeons/pinia.dart; fi
          if [ -f "lib/pigeons/status_management.dart" ]; then dart run pigeon --input lib/pigeons/status_management.dart; fi
          if [ -f "lib/pigeons/app.dart" ]; then dart run pigeon --input lib/pigeons/app.dart; fi
          if [ -f "lib/pigeons/project.dart" ]; then dart run pigeon --input lib/pigeons/project.dart; fi
          if [ -f "lib/pigeons/apk_analysis.dart" ]; then dart run pigeon --input lib/pigeons/apk_analysis.dart; fi
          if [ -f "lib/pigeons/so_analysis.dart" ]; then dart run pigeon --input lib/pigeons/so_analysis.dart; fi
          if [ -f "lib/pigeons/lsposed.dart" ]; then dart run pigeon --input lib/pigeons/lsposed.dart; fi
          if [ -f "lib/pigeons/zygisk_frida.dart" ]; then dart run pigeon --input lib/pigeons/zygisk_frida.dart; fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (Release)
        if: inputs.build_type == 'release'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assemble${CAPITALIZED_FLAVOR}Release --no-daemon
        env:
          CAPITALIZED_FLAVOR: ${{ inputs.flavor == 'api100' && 'Api100' || 'Api101' }}

      - name: Build Debug APK
        if: inputs.build_type == 'debug'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assemble${CAPITALIZED_FLAVOR}Debug --no-daemon
        env:
          CAPITALIZED_FLAVOR: ${{ inputs.flavor == 'api100' && 'Api100' || 'Api101' }}

      - name: Build AAB
        if: inputs.build_type == 'release'
        run: |
          cd android
          ./gradlew :app:bundle${CAPITALIZED_FLAVOR}Release --no-daemon
        env:
          CAPITALIZED_FLAVOR: ${{ inputs.flavor == 'api100' && 'Api100' || 'Api101' }}

      - name: Find and list build outputs
        id: find_outputs
        run: |
          echo "=== Finding APK files ==="
          APK_FILES=$(find . -name "*.apk" -type f 2>/dev/null | head -5)
          echo "$APK_FILES"
          
          echo "=== Finding AAB files ==="
          AAB_FILES=$(find . -name "*.aab" -type f 2>/dev/null | head -5)
          echo "$AAB_FILES"
          
          # Set output paths for artifact upload
          APK_DIR=$(find . -name "*.apk" -type f 2>/dev/null | head -1 | xargs dirname || echo "")
          echo "apk_dir=$APK_DIR" >> $GITHUB_OUTPUT
          
          AAB_DIR=$(find . -name "*.aab" -type f 2>/dev/null | head -1 | xargs dirname || echo "")
          echo "aab_dir=$AAB_DIR" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JsxposedX-${{ inputs.flavor }}-${{ inputs.build_type }}
          path: |
            **/*.apk
            build/app/outputs/flutter-apk/*.apk
            android/app/build/outputs/apk/**/*.apk

      - name: Upload AAB artifact
        if: inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: JsxposedX-${{ inputs.flavor }}-bundle
          path: |
            **/*.aab
            build/app/outputs/bundle/**/*.aab
            android/app/build/outputs/bundle/**/*.aab
